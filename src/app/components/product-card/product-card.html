<div class="card h-100" appCardShadow [ngClass]="{ 'bg-warning': product.Quantity === 1 }">
    <img [src]="product.Img" alt="Product Image" class="card-img-top">
    <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ product.Name }}</h5>
        <p class="card-text">Price: {{ product.Price | currency }}</p>
        <p class="card-text">Quantity: {{ product.Quantity }} </p>
       
        @switch (product.Quantity) {
        @case (0) {
        <p class="text-danger">out of stock</p>
        }
        @case (1) {
        <p class="text-warning">last one item</p>
        }
        @case (2) {
        <p class="text-warning">last two items</p>
        }
        @default {
        <p class="text-success">in stock</p>
        }
        }
        <div class="mt-auto">
            <button (click)="onBuy()" [disabled]="product.Quantity === 0" class="btn btn-primary me-2">Buy</button>
            <button (click)="ShowDetails()" class="btn btn-secondary">Details</button>
        </div>
    </div>
</div>
