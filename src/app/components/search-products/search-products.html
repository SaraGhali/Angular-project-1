<div class="container mt-5">
    <h2 class="mb-4">Search Products</h2>
    
    <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="row g-3 mb-5">
      <div class="col-md-4">
        <label for="title" class="form-label">Product Title</label>
        <input type="text" id="title" formControlName="title" class="form-control" placeholder="Search by name...">
      </div>
      <div class="col-md-3">
        <label for="price_min" class="form-label">Min Price</label>
        <input type="number" id="price_min" formControlName="price_min" class="form-control" placeholder="Min">
      </div>
      <div class="col-md-3">
        <label for="price_max" class="form-label">Max Price</label>
        <input type="number" id="price_max" formControlName="price_max" class="form-control" placeholder="Max">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100" [disabled]="isSearching">
          {{ isSearching ? 'Searching...' : 'Search' }}
        </button>
      </div>
    </form>
  
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" *ngIf="results.length > 0">
      <div class="col" *ngFor="let product of results">
        <app-product-card [product]="product"></app-product-card>
      </div>
    </div>
  
    <div class="text-center mt-5" *ngIf="results.length === 0 && !isSearching">
      <p class="text-muted">No products found. Start a new search!</p>
    </div>
  </div>
